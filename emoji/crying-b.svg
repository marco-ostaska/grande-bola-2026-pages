<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="face" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </radialGradient>
    <style>
      .tear { animation: tearDrop 1.6s ease-in-out infinite; }
      @keyframes tearDrop {
        0% { transform: translateY(0); opacity: 1; }
        80% { transform: translateY(18px); opacity: 0.3; }
        100% { transform: translateY(20px); opacity: 0; }
      }
    </style>
  </defs>
  <circle cx="32" cy="34" r="26" fill="url(#face)" stroke="#1e40af" stroke-width="2"/>
  <!-- olhos para baixo -->
  <path d="M18 30 Q22 36 26 30" fill="none" stroke="#1e3a8a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M38 30 Q42 36 46 30" fill="none" stroke="#1e3a8a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- lágrima grande -->
  <path class="tear" d="M18 40 Q14 50 18 58 Q22 50 18 40" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <path class="tear" d="M46 40 Q42 50 46 58 Q50 50 46 40" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <!-- boca triste -->
  <path d="M22 52 Q32 46 42 52" fill="none" stroke="#1e3a8a" stroke-width="2.5" stroke-linecap="round"/>
</svg>